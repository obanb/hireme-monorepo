# ── Hotel Actions ──────────────────────────────────────────────────────────────

type ActionType {
  id:        ID!
  name:      String!
  color:     String!
  createdAt: String!
}

type HotelAction {
  id:          ID!
  title:       String!
  description: String
  type:        ActionType!
  typeId:      ID!
  startDate:   String!
  endDate:     String!
  pictureUrl:  String
  pdfUrl:      String
  createdAt:   String!
  updatedAt:   String!
}

input CreateActionTypeInput {
  name:  String!
  color: String!
}

input UpdateActionTypeInput {
  name:  String
  color: String
}

input CreateActionInput {
  title:       String!
  description: String
  typeId:      ID!
  startDate:   String!
  endDate:     String!
}

input UpdateActionInput {
  title:       String
  description: String
  typeId:      ID
  startDate:   String
  endDate:     String
}

input ActionsFilter {
  typeId: ID
  month:  String
  search: String
}

type HotelActionsPage {
  items:      [HotelAction!]!
  total:      Int!
  page:       Int!
  limit:      Int!
  totalPages: Int!
}

type Query {
  checkIn(id: ID!): CheckIn
  checkIns(filter: ListCheckInsFilter): [CheckIn!]!
  checkReservations(page: Int, limit: Int): CheckReservationsPage!
  checkReservation(originId: String!): CheckReservationBooking
  checkReservationDetail(originId: String!): ReservationCheckDetail
  benefits(filter: BenefitsFilter, page: Int, limit: Int): BenefitsPage!
  arrivingGuests(filter: ArrivingGuestsFilter, page: Int, limit: Int): ArrivingGuestsPage!
  registrationCards(filter: RegistrationCardsFilter, page: Int, limit: Int): RegistrationCardsPage!
  registrationCard(id: Int!): RegistrationCard
  pmsReservation(reservationId: Int!): PmsReservation
  actionTypes: [ActionType!]!
  actionType(id: ID!): ActionType
  actions(filter: ActionsFilter, page: Int, limit: Int): HotelActionsPage!
  action(id: ID!): HotelAction
}

type PmsMutationResult {
  isSuccess: Boolean!
  errors:    String
}

input PmsCheckInInput {
  reservationId: Int!
  resRoomId:     Int!
}

input PmsGuestAddressInput {
  street:      String!
  city:        String!
  zip:         String!
  countryISO2: String!
}

input PmsGuestGdprInput {
  repetitiveStay: Boolean!
  marketing:      Boolean!
}

input PmsGuestLoyaltyInput {
  loyaltyConsent: Boolean!
}

input PmsGuestCitizenInput {
  firstName:       String!
  surname:         String!
  address:         PmsGuestAddressInput!
  isMale:          Boolean!
  birthDate:       String
  idCard:          String!
  visa:            String!
  nationalityISO2: String
  email:           String
  gsm:             String
  gdpr:            PmsGuestGdprInput!
  loyalty:         PmsGuestLoyaltyInput
  idSignature:     String
  carLicensePlate: String
}

input PmsUpdateGuestInput {
  reservationId: Int!
  resRoomId:     Int!
  stayReasonId:  Int
  citizenId:     Int!
  citizen:       PmsGuestCitizenInput!
}

input PmsCompanyAddressInput {
  street:      String
  city:        String
  zip:         String
  countryISO2: String
}

input PmsCompanyLoyaltyInput {
  loyaltyConsent: Boolean!
  id:             Int
  number:         String
}

input PmsOwnerCompanyInput {
  name:       String!
  businessId: Float
  vatId:      String
  vatId2:     String
  vatPayer:   Boolean
  address:    PmsCompanyAddressInput
  loyalty:    PmsCompanyLoyaltyInput
  email:      String
  gsm:        String
  phone:      String
}

input PmsOwnerSubjectInput {
  id:      Int
  citizen: String
  company: PmsOwnerCompanyInput
}

input PmsUpdateOwnerInput {
  reservationId: Int!
  subject:       PmsOwnerSubjectInput!
}

type Mutation {
  createCheckIn(input: CreateCheckInInput!): CheckIn!
  performCheckIn(id: ID!): CheckIn!
  performCheckOut(input: CheckOutInput!): CheckIn!
  markNoShow(id: ID!): CheckIn!
  pmsUpdateNote(reservationId: Int!, note: String!): PmsMutationResult!
  pmsCheckIn(input: PmsCheckInInput!): PmsMutationResult!
  pmsUpdateGuest(input: PmsUpdateGuestInput!): PmsMutationResult!
  pmsUpdateOwner(input: PmsUpdateOwnerInput!): PmsMutationResult!
  createActionType(input: CreateActionTypeInput!): ActionType!
  updateActionType(id: ID!, input: UpdateActionTypeInput!): ActionType
  deleteActionType(id: ID!): Boolean!
  createAction(input: CreateActionInput!): HotelAction!
  updateAction(id: ID!, input: UpdateActionInput!): HotelAction
  deleteAction(id: ID!): Boolean!
}
