# ── Registration Cards ────────────────────────────────────────────────────────

type RegistrationCardHotel {
  id:        Int!
  name:      String!
  nameShort: String!
  street:    String
  city:      String
  zip:       String
  country:   String
}

type RegistrationCard {
  id:                   Int!
  idCard:               Int!
  firstname:            String!
  surname:              String!
  dateOfBirth:          String
  phone:                String
  email:                String
  street:               String
  city:                 String
  zip:                  String
  countryOfResidence:   String
  nationality:          String
  documentNumber:       String
  visaNumber:           String
  carPlate:             String
  arrival:              String!
  departure:            String!
  reservationId:        Int!
  hotel:                RegistrationCardHotel!
  source:               String
  room:                 String
  purposeOfStay:        String
  idStay:               String
  isDataConfirmed:      Boolean!
  isGDPRRead:           Boolean!
  isHouseRulesAccepted: Boolean!
}

input RegistrationCardsFilter {
  hotelId:     Int
  hotelName:   String
  arrival:     String
  departure:   String
  dateOfBirth: String
  search:      String
}

type RegistrationCardsPage {
  items:      [RegistrationCard!]!
